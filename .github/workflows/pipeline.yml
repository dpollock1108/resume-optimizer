name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Test backend
        working-directory: backend
        env:
          APP_ENV: development
          ANTHROPIC_API_KEY: test-key-not-used
          GOOGLE_CLOUD_PROJECT: test-project
        run: python -m unittest discover -s tests -v

  build-and-deploy:
    name: Build image and deploy
    if: github.event_name != 'pull_request'
    needs: quality-gates
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Authenticate Docker to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Define immutable image name
        id: image
        shell: bash
        run: echo "uri=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/resume-optimizer:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.uri }}

      - name: Deploy exact image to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.image.outputs.uri }}
          # Full desired state is declared here so a bad manual deploy can never
          # persist — every pipeline run overwrites env/secrets back to these values.
          secrets: |
            ANTHROPIC_API_KEY=anthropic-api-key:latest
          env_vars: |
            APP_ENV=production
            ANTHROPIC_MODEL=claude-sonnet-5
            IAP_AUDIENCE=/projects/450317661331/locations/us-west1/services/resume-optimizer
            AI_REQUESTS_PER_HOUR=10
            LEGACY_MIGRATION_EMAIL=dpollock1108@gmail.com
            LEGACY_MIGRATION_USER_ID=local-user
          # service account must be a gcloud flag — the action has no dedicated input for it
          flags: "--service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }} --no-allow-unauthenticated --max-instances=3"

      - name: Summarize deployment
        run: |
          echo "### Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.image.outputs.uri }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
